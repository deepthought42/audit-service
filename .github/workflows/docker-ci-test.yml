name: Test

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    # This job runs on PR creation and updates
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download core JAR
        run: bash scripts/download-core.sh

      - name: Install core JAR to local repository
        run: mvn install:install-file -Dfile=libs/core-0.3.13.jar -DgroupId=com.looksee -DartifactId=core -Dversion=0.3.13 -Dpackaging=jar

      - name: Test with Maven
        run: mvn test
        
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Compute Docker-safe tag
        shell: bash
        run: |
          RAW_TAG="${{ github.head_ref }}"
          SAFE_TAG=$(echo "$RAW_TAG" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//')
          if [ -z "$SAFE_TAG" ]; then SAFE_TAG="pr-${{ github.event.pull_request.number }}"; fi
          echo "DOCKER_TAG=$SAFE_TAG" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build -t deepthought42/audit-update-service:${{ env.DOCKER_TAG }} .
          docker tag deepthought42/audit-update-service:${{ env.DOCKER_TAG }} deepthought42/audit-update-service:latest
